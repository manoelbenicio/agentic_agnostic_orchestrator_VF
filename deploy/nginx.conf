# 🪐 AOP Web Interface - Native Nginx Proxy Configuration

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    # Dynamically scales concurrent structural TCP connections natively
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # Low-level TCP optimization matrices
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # --- Massive GZIP Compression Bounds ---
    gzip  on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6; # Optimal balance of CPU compression vs Latency reduction
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # --- Hardened Geometric Security Headers ---
    add_header X-Frame-Options "DENY" always; # Completely negates UI Clickjacking vectors natively
    add_header X-Content-Type-Options "nosniff" always; # Prevents arbitrary MIME Sniffing logic attacks
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Obscure internal server structural identities mapping to network scans
    server_tokens off;

    server {
        # Exposed native client TCP bounds
        listen 3001;
        server_name localhost;

        # Web Root Directory mapped precisely by Docker Volumes
        root /usr/share/nginx/html;
        index index.html;

        # --- SPA Architecture Routing (React Router) ---
        location / {
            # Tries strict files first. If not found, natively reroutes execution 
            # bounds explicitly to index.html to allow React Router logic to execute natively.
            try_files $uri $uri/ /index.html;
        }

        # --- High-Performance Aggressive Asset Caching ---
        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4|webm)$ {
            expires 6M; # Instantly bounds asset retention to 6 Months natively
            access_log off; # Eliminates massive disk I/O thrashing for static hits
            add_header Cache-Control "public, max-age=15552000, immutable";
            try_files $uri =404;
        }

        # --- API Reverse Proxy (Control Plane Gateway) ---
        location /api/ {
            # Maps natively utilizing internal Docker DNS networking
            proxy_pass http://control-plane:8000/;
            
            # Persist accurate structural client headers across the network hop
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # --- WebSocket State Maintenance (Crucial for Health Monitor) ---
            # Explicitly maps HTTP 1.1 UPGRADE protocols preventing WS Connection Resets
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Deep Execution TCP Timeouts optimized for prolonged LLM Generation streaming logic
            proxy_connect_timeout 60s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
