# AOP Helm Chart — default values
# Deployments: controlPlane, web, nginx (stateless); postgres, redis (stateful); herdmaster (stateful external)

nameOverride: ""
fullnameOverride: ""

namespace: aop

# Global image defaults (overridable per-service)
global:
  imagePullSecrets: []
  imageRegistry: ""
  storageClass: ""

image:
  pullPolicy: IfNotPresent

# ---- Secrets management ----
# Use External Secrets Operator (recommended) or plain K8s Secrets (dev only).
secrets:
  useExternalSecrets: true
  backend: aws-secrets-manager
  secretStoreName: aop-secret-store
  refreshInterval: 1h
  # Plaintext fallback (dev/CI only — leave empty in production)
  postgresPassword: ""
  redisPassword: ""
  herdmasterToken: ""

# ---- Ingress ----
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: aop.example.com
      paths:
        - path: /
          pathType: Prefix
          service: web
        - path: /api
          pathType: Prefix
          service: controlPlane
  tls:
    - secretName: aop-tls
      hosts:
        - aop.example.com

# =========================================================================
# Stateless services
# =========================================================================

controlPlane:
  enabled: true
  image:
    repository: aop/control-plane
    tag: local
  replicaCount: 2
  service:
    type: ClusterIP
    port: 8090
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  probes:
    liveness:
      enabled: true
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      enabled: true
      path: /health/ready
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1
  env:
    herdmasterUrl: http://herdmaster:8080
    # DATABASE_URL and REDIS_URL are templated from postgres/redis services
  nodeSelector: {}
  tolerations: []
  affinity: {}

web:
  enabled: true
  image:
    repository: aop/web
    tag: local
  replicaCount: 2
  service:
    type: ClusterIP
    port: 13000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  probes:
    liveness:
      enabled: true
      path: /
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      enabled: true
      path: /
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1
  env:
    nextPublicApiUrl: http://nginx:8000/api
  nodeSelector: {}
  tolerations: []
  affinity: {}

nginx:
  enabled: true
  image:
    repository: nginx
    tag: latest
  replicaCount: 2
  service:
    type: LoadBalancer
    port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  probes:
    liveness:
      enabled: true
      path: /
      initialDelaySeconds: 10
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      enabled: true
      path: /
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 80
  pdb:
    enabled: true
    minAvailable: 1
  config:
    upstreamControlPlane: control-plane:8090
    upstreamWeb: web:13000
  nodeSelector: {}
  tolerations: []
  affinity: {}

# =========================================================================
# Stateful services
# =========================================================================

postgres:
  enabled: true
  image:
    repository: pgvector/pgvector
    tag: pg17
  replicaCount: 1
  service:
    type: ClusterIP
    port: 5432
  statefulSet:
    enabled: true
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 20Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  env:
    database: aop
    user: aop_dev
  pdb:
    enabled: false
    minAvailable: 1
  # Logical replication config (Phase 3)
  replication:
    enabled: false
    publication: aop_publication
    slot: aop_replication_slot
  nodeSelector: {}
  tolerations: []
  affinity: {}

redis:
  enabled: true
  image:
    repository: redis/redis-stack-server
    tag: latest
  replicaCount: 1
  service:
    type: ClusterIP
    port: 6379
  statefulSet:
    enabled: true
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 5Gi
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  pdb:
    enabled: false
    minAvailable: 1
  # HA mode: sentinel | cluster | standalone
  ha:
    mode: standalone
    sentinelReplicas: 3
  nodeSelector: {}
  tolerations: []
  affinity: {}

# =========================================================================
# HerdMaster (sibling project — separate deployment)
# =========================================================================

herdmaster:
  enabled: true
  image:
    repository: herdmaster
    tag: latest
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  probes:
    liveness:
      enabled: true
      path: /metrics
      initialDelaySeconds: 20
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      enabled: true
      path: /metrics
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
  config:
    bind: "127.0.0.1"
    aclDefaultPolicy: deny
  nodeSelector: {}
  tolerations: []
  affinity: {}
