# LOCAL OVERRIDE for Herdr agent detection — agent "kiro" (Kiro / AWS)
# Installed to: ~/.config/herdr/agent-detection/kiro.toml
# REPLACE semantics: fully replaces the bundled/remote kiro manifest, so it MUST
# contain the complete existing ruleset PLUS our additions.
#
# Base: remote kiro.toml version 2026.06.10.1 (captured 2026-06-26 from
#   ~/.local/state/herdr/agent-detection/remote/kiro.toml — rules copied verbatim).
# Addition: rule `ready_prompt_idle` (state=idle) — upstream defines only
#   working+blocked, so an idle Kiro prompt fell back to
#   default_known_agent_idle_fallback. This closes that gap.
id = "kiro"
version = "2026.06.10.99"
min_engine_version = 1
updated_at = "2026-06-26T00:00:00Z"
aliases = ["kiro-cli"]

# ── EXISTING RULES (verbatim from remote 2026.06.10.1) ──────────────────────────
[[rules]]
id = "tool_approval"
state = "blocked"
priority = 300
region = "whole_recent"
visible_blocker = true
contains = ["requires approval"]
any = [
  { contains = ["yes, single permission"] },
  { contains = ["trust, always allow"] },
  { contains = ["no (tab to edit)"] },
  { contains = ["esc to close"] },
]

[[rules]]
id = "subagent_approval"
state = "blocked"
priority = 290
region = "whole_recent"
visible_blocker = true
contains = ["pending from subagents"]
any = [
  { contains = ["tool approval"] },
  { contains = ["tool approvals"] },
]
all = [
  { any = [{ contains = ["approve all pending"] }, { contains = ["configure individually"] }, { contains = ["exit (cancel subagents)"] }] },
]

[[rules]]
id = "kiro_working_marker"
state = "working"
priority = 100
region = "whole_recent"
visible_working = true
contains = ["kiro is working"]

[[rules]]
id = "tool_spinner_working"
state = "working"
priority = 90
region = "whole_recent"
visible_working = true
contains = ["esc to cancel"]
line_regex = ['^\s*(◔|◑|◕|●)\s+\p{Alphabetic}']

# ── LOCAL ADDITION: idle detection (low priority so working/blocked win) ────────
# Signature captured live 2026-06-26 from w8:p12, w8:p14, w8:pG: the empty ready
# prompt always shows the placeholder "ask a question or describe a task". Low
# priority (50) keeps working (90/100) and blocked (290/300) ahead. The `not`
# guards exclude the working markers as belt-and-suspenders — note the idle status
# line uses the same ◔ glyph as tool_spinner_working, but that working rule also
# requires "esc to cancel", which we explicitly exclude here.
[[rules]]
id = "ready_prompt_idle"
state = "idle"
priority = 50
region = "whole_recent"
visible_idle = true
contains = ["ask a question or describe a task"]
not = [
  { contains = ["kiro is working"] },
  { contains = ["esc to cancel"] },
  { contains = ["requires approval"] },
  { contains = ["pending from subagents"] },
]
