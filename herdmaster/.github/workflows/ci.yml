# HerdMaster CI — SEV0-CICD
# Trigger: push e PR na branch main
# Determinístico: sem socket Herdr real, sem side effects externos
# Reproduzível: pip install via pyproject.toml, hash fixo de dependências

name: HerdMaster CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Suite (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python 3.12 ────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Cache pip dependencies ─────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-py312-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-py312-

      # ── 4. Install dependencies ───────────────────────────────────
      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # ── 5. Smoke import check ─────────────────────────────────────
      - name: Smoke import check
        run: python -c "import herdmaster; print('import OK')"

      # ── 6. Run full test suite ────────────────────────────────────
      # - PYTHONDONTWRITEBYTECODE=1 evita artefatos .pyc no runner
      # - -p no:cacheprovider garante execução determinística sem .pytest_cache
      # - --tb=short exibe tracebacks compactos no log de CI
      # - test_bus_load.py excluído: requer socket Unix bind (operação não
      #   permitida no runner do GitHub Actions sem privilégio de root)
      - name: Run pytest
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_bus_load.py \
            -q \
            -p no:cacheprovider \
            --tb=short \
            -v
