# =============================================================================
# AgnosticAI Platform — Prometheus Alerting Rules
# =============================================================================
#
# Alert rules for the agnostic-ai-platform backend.
# These rules consume the metrics exposed at /metrics by the FastAPI backend
# (prefixed agnosticai_*) and the blackbox-exporter probe results.
#
# Usage:
#   Mount this file into Prometheus via prometheus.yml:
#     rule_files:
#       - /etc/prometheus/alert_rules.yml
#
# Severity tiers:
#   critical  — immediate human intervention required (paging)
#   warning   — investigate within SLA (ticket / Slack)
#   info      — advisory, no action required
# =============================================================================

groups:
  # -------------------------------------------------------------------
  # 1. Backend Readiness
  # -------------------------------------------------------------------
  - name: backend_readiness
    rules:
      # BackendNotReady
      # Fires when the /health endpoint does not return a 2xx for 2 min.
      # Uses the blackbox-exporter HTTP probe configured in prometheus.yml.
      - alert: BackendNotReady
        expr: probe_success{job="blackbox-backend"} == 0
        for: 2m
        labels:
          severity: critical
          component: backend
          service: agnostic-ai-platform
        annotations:
          summary: "Backend health-check is failing"
          description: >-
            The blackbox-exporter probe against the backend /health endpoint
            has been failing for more than 2 minutes.
            This means the API is unreachable or returning non-2xx responses.
          runbook_url: "https://wiki.internal/runbooks/agnosticai/backend-not-ready"
          dashboard_url: "http://localhost:3001/d/agnosticai-overview"

      # BackendNotReady (fallback via up{})
      # Fires when Prometheus itself cannot scrape the backend target.
      - alert: BackendNotReady_ScrapeDown
        expr: up{job="backend"} == 0
        for: 2m
        labels:
          severity: critical
          component: backend
          service: agnostic-ai-platform
        annotations:
          summary: "Backend scrape target is down"
          description: >-
            Prometheus cannot reach the backend /metrics endpoint.
            The backend container may have crashed or the network is partitioned.
          runbook_url: "https://wiki.internal/runbooks/agnosticai/backend-not-ready"

  # -------------------------------------------------------------------
  # 2. HTTP Error Rate
  # -------------------------------------------------------------------
  - name: http_error_rate
    rules:
      # HighErrorRate — 5xx
      # Fires when > 5% of requests return 5xx over a 5-min window.
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(agnosticai_http_errors_total{status=~"5.."}[5m])) by (path)
            /
            sum(rate(agnosticai_http_requests_total[5m])) by (path)
          ) > 0.05
        for: 3m
        labels:
          severity: critical
          component: backend
          service: agnostic-ai-platform
        annotations:
          summary: "High 5xx error rate on {{ $labels.path }}"
          description: >-
            More than 5% of HTTP requests to {{ $labels.path }} are returning
            5xx status codes over the last 5 minutes
            (current value: {{ $value | humanizePercentage }}).
          runbook_url: "https://wiki.internal/runbooks/agnosticai/high-error-rate"
          dashboard_url: "http://localhost:3001/d/agnosticai-http"

      # HighErrorRate — 4xx (elevated client errors, warning only)
      # Fires when > 20% of requests return 4xx over a 5-min window.
      - alert: HighClientErrorRate
        expr: |
          (
            sum(rate(agnosticai_http_errors_total{status=~"4.."}[5m])) by (path)
            /
            sum(rate(agnosticai_http_requests_total[5m])) by (path)
          ) > 0.20
        for: 5m
        labels:
          severity: warning
          component: backend
          service: agnostic-ai-platform
        annotations:
          summary: "Elevated 4xx error rate on {{ $labels.path }}"
          description: >-
            More than 20% of HTTP requests to {{ $labels.path }} are returning
            4xx status codes over the last 5 minutes
            (current value: {{ $value | humanizePercentage }}).
          runbook_url: "https://wiki.internal/runbooks/agnosticai/high-client-error-rate"

      # HighErrorRate — global (all paths combined)
      # Fires when > 10% of ALL requests return any error (4xx + 5xx).
      - alert: HighGlobalErrorRate
        expr: |
          (
            sum(rate(agnosticai_http_errors_total[5m]))
            /
            sum(rate(agnosticai_http_requests_total[5m]))
          ) > 0.10
        for: 5m
        labels:
          severity: warning
          component: backend
          service: agnostic-ai-platform
        annotations:
          summary: "Global HTTP error rate exceeds 10%"
          description: >-
            More than 10% of all HTTP requests across the platform are
            returning error status codes (current: {{ $value | humanizePercentage }}).
          runbook_url: "https://wiki.internal/runbooks/agnosticai/high-error-rate"

  # -------------------------------------------------------------------
  # 3. LLM Latency
  # -------------------------------------------------------------------
  - name: llm_latency
    rules:
      # LLMHighLatency — p95
      # Fires when the 95th-percentile HTTP latency on LLM-related paths
      # exceeds 10 seconds for 3 minutes.
      - alert: LLMHighLatency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(agnosticai_http_request_duration_seconds_bucket{path=~"/api/llm.*|/api/chat.*|/api/completions.*|/api/v1/llm.*"}[5m])) by (le, path)
          ) > 10
        for: 3m
        labels:
          severity: warning
          component: llm
          service: agnostic-ai-platform
        annotations:
          summary: "LLM p95 latency > 10s on {{ $labels.path }}"
          description: >-
            The 95th-percentile request latency for LLM endpoint
            {{ $labels.path }} has exceeded 10 seconds for the past 3 minutes
            (current p95: {{ $value | humanizeDuration }}).
            This may indicate upstream LLM provider throttling, network issues,
            or oversized payloads.
          runbook_url: "https://wiki.internal/runbooks/agnosticai/llm-high-latency"
          dashboard_url: "http://localhost:3001/d/agnosticai-llm"

      # LLMHighLatency — p99 critical
      # Fires when the 99th-percentile latency on LLM paths exceeds 30s.
      - alert: LLMHighLatency_P99
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(agnosticai_http_request_duration_seconds_bucket{path=~"/api/llm.*|/api/chat.*|/api/completions.*|/api/v1/llm.*"}[5m])) by (le, path)
          ) > 30
        for: 5m
        labels:
          severity: critical
          component: llm
          service: agnostic-ai-platform
        annotations:
          summary: "LLM p99 latency > 30s on {{ $labels.path }}"
          description: >-
            The 99th-percentile request latency for LLM endpoint
            {{ $labels.path }} has exceeded 30 seconds for the past 5 minutes
            (current p99: {{ $value | humanizeDuration }}).
          runbook_url: "https://wiki.internal/runbooks/agnosticai/llm-high-latency"

      # LLMHighLatency — average (catch-all)
      # Fires when average request duration for any path exceeds 5s.
      - alert: HighAvgLatency
        expr: |
          (
            sum(rate(agnosticai_http_request_duration_seconds_sum[5m])) by (path)
            /
            sum(rate(agnosticai_http_request_duration_seconds_count[5m])) by (path)
          ) > 5
        for: 5m
        labels:
          severity: warning
          component: backend
          service: agnostic-ai-platform
        annotations:
          summary: "Average request latency > 5s on {{ $labels.path }}"
          description: >-
            The average HTTP request duration for {{ $labels.path }} has
            exceeded 5 seconds over the past 5 minutes
            (current avg: {{ $value | humanizeDuration }}).

  # -------------------------------------------------------------------
  # 4. LLM Operational Alerts (bonus)
  # -------------------------------------------------------------------
  - name: llm_operations
    rules:
      # High LLM fallback rate
      - alert: LLMHighFallbackRate
        expr: |
          sum(rate(agnosticai_llm_fallback_total[10m])) > 0.5
        for: 5m
        labels:
          severity: warning
          component: llm
          service: agnostic-ai-platform
        annotations:
          summary: "Elevated LLM model fallback rate"
          description: >-
            The LLM fallback rate has exceeded 0.5 fallbacks/sec over the last
            10 minutes. This may indicate the primary model is consistently
            unavailable or rate-limited.
